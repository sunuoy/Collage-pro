name: Build & Publish Release APK

on:
  push:
    tags:
      - 'v*'
  release:
    types: [published, edited]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build Debug APK
        run: |
          if [ -f "./gradlew" ]; then
            chmod +x gradlew
            ./gradlew assembleDebug --stacktrace
          else
            gradle assembleDebug --stacktrace
          fi

      - name: Prepare APK for Release
        run: |
          mkdir -p release_assets
          TAG_NAME="${{ github.ref_name }}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG_NAME="latest"
          fi
          cp app/build/outputs/apk/debug/app-debug.apk "release_assets/Collage-pro-${TAG_NAME}.apk"

      - name: Upload APK to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Collage Pro ${{ github.ref_name }}"
          files: release_assets/*.apk
          overwrite: true
          generate_release_notes: true
          body: |
            ## 🚀 What's New in Version 1.1

            ### ✨ Highlights & Feature Updates
            - **📄 A4 PDF Orientation Selection**: Added UI toggle to switch between portrait and landscape modes for PDF exports.
            - **🎨 Custom Application Launcher Icon**: Replaced default assets with custom collage-themed graphics featuring structured layouts and drop shadows.
            - **✨ Drag-and-Drop & PDF Export Improvements**: Enhanced interaction and document rendering logic.
            - **📦 Version Alignment**: Updated version configuration to `1.1`.

            ---
            *Automated release build generated by GitHub Actions.*
